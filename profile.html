<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャストプロフィール | リルレオクリニック</title>

    <!-- リンクプレビュー（OGP / Twitterカード） -->
    <meta name="description" content="リルレオクリニックのキャストプロフィール。VRChat交流イベント「肉球セラピー」リルレオクリニック。">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="リルレオクリニック">
    <meta property="og:locale" content="ja_JP">
    <meta property="og:title" content="キャストプロフィール | リルレオクリニック">
    <meta property="og:description" content="リルレオクリニックのキャストプロフィール。VRChat交流イベント「肉球セラピー」リルレオクリニック。">
    <meta property="og:url" content="https://atelier2006.github.io/lilleo-clinic/profile.html">
    <meta property="og:image" content="https://atelier2006.github.io/lilleo-clinic/images/clinic_logo.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="キャストプロフィール | リルレオクリニック">
    <meta name="twitter:description" content="リルレオクリニックのキャストプロフィール。VRChat交流イベント「肉球セラピー」リルレオクリニック。">
    <meta name="twitter:image" content="https://atelier2006.github.io/lilleo-clinic/images/clinic_logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Zen+Maru+Gothic:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 上部バー -->
    <div class="topbar">
        <span class="beat">💗</span>VRChat交流イベント「肉球セラピー」開催準備中
    </div>

    <!-- ナビ -->
    <nav>
        <div class="nav-inner">
            <a href="index.html" class="logo">
                <img src="images/logo_main.png" alt="肉球セラピー リルレオクリニック">
            </a>
            <div class="nav-links">
                <a href="index.html">イベント概要</a>
                <a href="cast.html">キャスト紹介</a>
                <a href="notice.html">注意事項</a>
            </div>
        </div>
    </nav>

    <!-- プロフィールメインセクション -->
    <main class="profile-container">
        <!-- 左側：写真（ホバーでなでなで） -->
        <div class="profile-left">
            <div class="photo-frame">
                <img id="js-photo" class="zoomable-img" src="" alt="">
            </div>
        </div>

        <!-- 右側：詳細情報 -->
        <div class="profile-right">
            <p id="js-role" class="profile-role"></p>
            <h1 id="js-name" class="profile-name"></h1>

            <div class="profile-comment">
                <p id="js-comment"></p>
            </div>

            <div class="profile-text">
                <p id="js-description"></p>
            </div>

            <div class="profile-back">
                <a href="cast.html" class="btn-back">← キャスト一覧に戻る</a>
            </div>
        </div>
    </main>

    <!-- フッター -->
    <footer>
        <div class="footer-paws" aria-hidden="true">🐾 🐾 🐾</div>
        <p>© 2026 リルレオクリニック アスユイ</p>
    </footer>

    <!-- 写真拡大表示用オーバーレイ（クリックで大画面表示） -->
    <div id="image-overlay" class="overlay">
        <span class="close-btn">&times;</span>
        <img class="overlay-content" id="expanded-image" alt="">
    </div>

    <!-- 共通ギミック（肉球エフェクト・なでなで・BGM・プロフィール描画はすべて script.js に集約） -->
    <script src="script.js"></script>
</body>

</html>
