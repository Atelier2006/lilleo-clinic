<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャストプロフィール | リルレオクリニック</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ナビ -->
    <nav>
        <div class="nav-inner">
            <a href="index.html" class="logo">
                <img src="images/logo_main.png" alt="肉球セラピー リルレオクリニック">
            </a>
            <div class="nav-links">
                <a href="index.html">イベント概要</a>
                <a href="cast.html">キャスト紹介</a>
                <a href="notice.html">注意事項</a>
            </div>
        </div>
    </nav>

    <!-- プロフィールメインセクション -->
    <main class="profile-container">
        <!-- 左側 -->
        <div class="profile-left">
            <div class="photo-frame">
                <img id="js-photo" src="（仮の画像パス）" alt="">
            </div>
        </div>

        <!-- 右側：詳細情報 -->
        <div class="profile-right">
            <p id="js-role" class="profile-role"></p>
            <h1 id="js-name" class="profile-name"></h1>

            <div class="profile-comment">
                <p id="js-comment"></p>
            </div>

            <div class="profile-text">
                <p id="js-description"></p>
            </div>

            <div class="profile-back">
                <a href="cast.html" class="btn-back">← キャスト一覧に戻る</a>
            </div>
        </div>
    </main>

    <!-- フッター -->
    <footer>
        <p>© 2026 リルレオクリニック アスユイ</p>
    </footer>

    <!-- データを制御するJavaScript -->
    <script>
        // 1. キャストのデータ管理（役職順：院長 ➔ 副院長 ➔ 医者）
        const castData = {
            // --- 院長 ---
            ageru: {
                role: "🏥 院長",
                name: "あげる",
                image: "images/cast_ageru.jpg",
                comment: "「あなたの心が少しでも軽くなりますように。ゆっくりお話ししましょう。」",
                description: "リルレオクリニックを優しく統括する院長先生。<br>包み込むような穏やかな診療スタイルで、日々の生活でちょっぴり疲れてしまった患者様の心をゆっくりと温かく癒します。"
            },
            // --- 副院長 ---
            uron: {
                role: "📋 副院長・受付",
                name: "うろん",
                image: "images/cast_uron.jpg",
                comment: "「初めての方もどうぞ安心してお越しください。ご案内いたします。」",
                description: "クリニックの顔として皆様をお迎えする副院長兼受付スタッフ。<br>初めてご来院された患者様にも安心していただけるよう、心のこもった優しいご案内で院内へと丁寧にお繋ぎいたします。"
            },
            // --- 医者 ---
            asuyui: {
                role: "🩺 医者",
                name: "アスユイ",
                image: "images/cast_asuyui.jpg",
                comment: "「どんな小さなことでも、あなたのペースでお聞かせくださいね。」",
                description: "いつも落ち着いた優しい雰囲気を持ったお医者さん。<br>どんな小さなお悩みでもゆったりと耳を傾け、患者様のペースに合わせて心に寄り添う丁寧なカウンセリングを行います。"
            },
            omuraichu: {
                role: "🩺 医者",
                name: "おむらいちゅ",
                image: "images/cast_omuraichu.jpg",
                comment: "「お話ししてハッピーになっちゃいましょう！元気をお届けします！」",
                description: "いつも元気いっぱいで笑顔あふれるムードメーカー！<br>お話しするだけで心がパッと明るくなるような、ポジティブでハッピーなパワーあふれる診療をお届けします！"
            },
            nakaron: {
                role: "🩺 医者",
                name: "ナカロン",
                image: "images/cast_nakaron.jpg",
                comment: "「ほっと一息つける、安心できる時間を一緒に過ごしましょう。」",
                description: "細やかな気配りと、温かい診察が評判のお医者さん。<br>クリニックならではの、ホッと安心できるような心地よい空間を演出し、皆様の不安や緊張を優しく解きほぐします。"
            },
            akino: {
                role: "🩺 医者",
                name: "あきの",
                image: "images/cast_akino.jpg",
                comment: "「ここにいる間は、肩の力を抜いて何でもお話しくださいね。」",
                description: "親しみやすさと話しやすい雰囲気が魅力のお医者さん。<br>患者様と同じ目線で親身になって話を聴き、どんなに小さな不安やつまずきも一緒に解消へと導いてくれます。"
            },
            remix: {
                role: "🩺 医者",
                name: "リミックス",
                image: "images/cast_remix.jpg",
                comment: "「あなたの心が前を向けるように、全力でサポートします！」",
                description: "頼りがいがあり、一歩を踏み出す元気をくれるお医者さん。<br>親身なアドバイスと明るい笑顔で、患者様の「変わりたい」「元気になりたい」という前向きな気持ちを力強く支えます。"
            }
        };

        // 2. URLからidを抽出
        const params = new URLSearchParams(window.location.search);
        const castId = params.get('id');

        // 3. 該当するキャストデータを反映
        if (castId && castData[castId]) {
            const data = castData[castId];

            document.getElementById('js-role').textContent = data.role;
            document.getElementById('js-name').textContent = data.name;
            document.getElementById('js-photo').src = data.image;
            document.getElementById('js-photo').alt = data.name + "先生の写真";
            document.getElementById('js-comment').textContent = data.comment;
            document.getElementById('js-description').innerHTML = data.description;

            // ページタイトルもブラウザ用に書き換え
            document.title = `${data.name} | キャスト紹介 | リルレオクリニック`;
        } else {
            // エラー時（該当キャストが見つからない場合）
            document.querySelector('.profile-container').innerHTML = `
                <div style="text-align:center; width:100%; padding:100px 0;">
                    <p>キャスト情報が見つかりませんでした。</p>
                    <a href="cast.html" class="btn-back">キャスト一覧に戻る</a>
                </div>
            `;
        }
    </script>
</body>

</html>
